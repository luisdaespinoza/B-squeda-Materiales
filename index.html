<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Inteligente de Materiales</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <!-- Iconos Lucide -->

    <style>
        /* Estilos personalizados para el resaltado del texto en las búsquedas */
        mark {
            background-color: #fef08a; /* Amarillo suave en modo claro */
            color: #1e293b;
            border-radius: 2px;
            padding: 0 2px;
        }
        .dark mark {
            background-color: #854d0e; /* Amarillo mostaza oscuro en modo oscuro */
            color: #fef08a;
        }
        /* Transiciones suaves de color y fondo */
        .transition-all-200 {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 sm:p-8 transition-all-200">
        
        <!-- CABECERA -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-blue-100 dark:bg-blue-950 text-blue-600 dark:text-blue-400 rounded-xl">
                    <i data-lucide="package-search" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-bold tracking-tight">Buscador de Códigos</h1>

                </div>
            </div>
            
            <!-- Botón de Modo Oscuro -->

                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
            </button>
        </div>

        <!-- BUSCADOR -->
        <div class="relative mb-6">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                <i data-lucide="search" class="w-5 h-5"></i>
            </span>
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Escribe el nombre del material..." 
                class="w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 focus:border-blue-500 dark:focus:border-blue-600 rounded-xl outline-none text-base sm:text-lg transition-all-200 shadow-inner"
                autocomplete="off"
            >
            <!-- Botón limpiar (X) -->
            <button 
                id="clearButton" 
                class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hidden"
                title="Limpiar búsqueda"
            >
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- SECCIÓN DE INFO/CONTEO -->
        <div class="flex justify-between items-center mb-4 text-xs sm:text-sm font-medium text-slate-400">
            <span id="resultsCount">Mostrando todos los materiales</span>
        </div>

        <!-- LISTA VERTICAL DE MATERIALES -->
        <div id="resultsList" class="space-y-3 max-h-[500px] overflow-y-auto pr-1">
            <!-- Los elementos se renderizan aquí dinámicamente -->
        </div>

        <!-- CONTROLES DE PAGINACIÓN -->
        <div id="paginationControls" class="hidden flex items-center justify-between mt-4 border-t border-slate-100 dark:border-slate-800 pt-4">
            <button id="prevPageBtn" class="flex items-center gap-1 px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed dark:bg-slate-800/50 dark:text-slate-300 dark:hover:bg-slate-700 transition-all-200">
                <i data-lucide="chevron-left" class="w-4 h-4"></i> Anterior
            </button>
            <span id="pageIndicator" class="text-xs sm:text-sm font-medium text-slate-500 dark:text-slate-400 text-center">
                Página 1 de X
            </span>
            <button id="nextPageBtn" class="flex items-center gap-1 px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed dark:bg-slate-800/50 dark:text-slate-300 dark:hover:bg-slate-700 transition-all-200">
                Siguiente <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- MENSAJE DE AYUDA SI NO HAY COINCIDENCIAS -->
        <div id="noResults" class="hidden p-8 text-center bg-slate-50 dark:bg-slate-950 border border-dashed border-slate-200 dark:border-slate-800 rounded-2xl">
            <div class="inline-flex p-3 bg-amber-50 dark:bg-amber-950/40 text-amber-500 rounded-full mb-3">

            </div>
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-200 mb-1">¿No encuentras el material?</h3>
            <p class="text-sm text-slate-400 dark:text-slate-500 max-w-sm mx-auto leading-relaxed">
                Intenta buscar usando palabras más simples (ej: <span class="font-semibold text-slate-600 dark:text-slate-300">guante</span>, <span class="font-semibold text-slate-600 dark:text-slate-300">casco</span>, <span class="font-semibold text-slate-600 dark:text-slate-300">filtro</span>). Si aún no aparece, consúltalo con el equipo de bodega.
            </p>
        </div>

    </div>

        // ==========================================
        // 3. DETECCIÓN AUTOMÁTICA DEL MODO OSCURO
        // ==========================================
        function initTheme() {
            const hora = new Date().getHours();
            const esDeNoche = hora >= 19 || hora < 7;
            const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            const temaGuardado = localStorage.getItem('theme');
            if (temaGuardado === 'dark' || (!temaGuardado && (esDeNoche || prefiereOscuro))) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        
        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        // ==========================================
        // 4. FUNCIÓN PARA COPIAR AL PORTAPAPELES
        // ==========================================
        function copiarCodigo(codigo) {
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = codigo;
            tempTextArea.style.position = 'fixed';
            tempTextArea.style.opacity = '0';
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            
            let copiadoExitoso = false;
            try {
                copiadoExitoso = document.execCommand('copy');
            } catch (err) {
                console.error('No se pudo copiar el código', err);
            }
            document.body.removeChild(tempTextArea);

            if (copiadoExitoso) {
                mostrarToast(`Código "${codigo}" copiado`);
            }
        }

        function mostrarToast(mensaje) {
            toastMessage.textContent = mensaje;
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
            }, 2300);
        }

        function escaparHTML(texto) {
            return texto
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function resaltarTexto(texto, consulta) {
            if (!consulta) return escaparHTML(texto);
            const textoEscapado = escaparHTML(texto);
            const consultaLimpia = consulta.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const regex = new RegExp(`(${consultaLimpia})`, 'gi');
            return textoEscapado.replace(regex, '<mark>$1</mark>');
        }

        function renderizarLista(elementos, consulta = '', totalResultados = 0, startIndex = 0, endIndex = 0) {
            resultsList.innerHTML = '';
            
            if (elementos.length === 0) {
                resultsList.classList.add('hidden');
                paginationControls.classList.add('hidden');
                noResults.classList.remove('hidden');
                resultsCount.textContent = `0 resultados encontrados`;
                return;
            }

            noResults.classList.add('hidden');
            resultsList.classList.remove('hidden');
            
            // OPTIMIZACIÓN 3: DocumentFragment evita que el navegador redibuje la lista ítem por ítem
            const fragment = document.createDocumentFragment();

            elementos.forEach(item => {
                const card = document.createElement('div');
                card.className = "flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-950/40 border border-slate-150 dark:border-slate-800/60 rounded-xl hover:border-slate-300 dark:hover:border-slate-700 hover:shadow-sm transition-all-200 group";
                
                const codigoFormateado = item.codigo.toUpperCase();
                
                card.innerHTML = `
                    <div class="flex-1 min-w-0 pr-4">
                        <h4 class="text-sm sm:text-base font-semibold text-slate-700 dark:text-slate-200 break-words leading-snug">
                            ${resaltarTexto(item.nombre, consulta)}
                        </h4>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <span class="font-mono text-sm sm:text-base font-bold bg-blue-50 dark:bg-blue-950/50 text-blue-700 dark:text-blue-300 px-3 py-1.5 rounded-lg border border-blue-100 dark:border-blue-900 tracking-wider">
                            ${resaltarTexto(codigoFormateado, consulta)}
                        </span>
                        <button 
                            class="copy-btn p-2 text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-all-200" 
                            title="Copiar código"
                            data-codigo="${item.codigo}"
                        >
                            ${iconCopySVG}
                        </button>
                    </div>
                `;

                card.querySelector('.copy-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    copiarCodigo(item.codigo);
                });

                fragment.appendChild(card);
            });

            // Agregamos todo de golpe al DOM
            resultsList.appendChild(fragment);

            if (consulta) {
                resultsCount.textContent = `Mostrando ${startIndex}-${endIndex} de ${totalResultados} resultado(s) para "${consulta}"`;
            } else {
                resultsCount.textContent = `Mostrando ${startIndex}-${endIndex} de ${totalResultados} materiales registrados`;
            }
        }

        // ==========================================
        // 6. LÓGICA DE PAGINACIÓN
        // ==========================================
        function actualizarBotonesPaginacion() {
            const totalPages = Math.ceil(currentFilteredResults.length / itemsPerPage);
            
            if (totalPages <= 1) {
                paginationControls.classList.add('hidden');
            } else {
                paginationControls.classList.remove('hidden');
                pageIndicator.textContent = `Página ${currentPage} de ${totalPages}`;
                
                prevPageBtn.disabled = currentPage === 1;
                nextPageBtn.disabled = currentPage === totalPages;
            }
        }

        function cambiarPagina(delta) {
            const totalPages = Math.ceil(currentFilteredResults.length / itemsPerPage);
            const nuevaPagina = currentPage + delta;
            
            if (nuevaPagina >= 1 && nuevaPagina <= totalPages) {
                currentPage = nuevaPagina;
                mostrarPaginaActual();
                // Hace scroll automáticamente al inicio de la lista al cambiar de página
                resultsList.scrollTop = 0;
            }
        }

        function mostrarPaginaActual() {
            // Calcular los índices de los elementos a mostrar
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            
            // Extraer solo la "página" actual de los resultados
            const itemsToShow = currentFilteredResults.slice(startIndex, endIndex);
            
            // Calcular números para la UI (ej. "Mostrando 1-50 de 120")
            const indexUIInicio = currentFilteredResults.length > 0 ? startIndex + 1 : 0;
            const indexUIFin = Math.min(endIndex, currentFilteredResults.length);

            renderizarLista(itemsToShow, currentSearchQuery, currentFilteredResults.length, indexUIInicio, indexUIFin);
            actualizarBotonesPaginacion();
        }

        // Asignar eventos a los botones
        prevPageBtn.addEventListener('click', () => cambiarPagina(-1));
        nextPageBtn.addEventListener('click', () => cambiarPagina(1));

        // ==========================================
        // 7. LÓGICA DE BÚSQUEDA INTELIGENTE
        // ==========================================
        function realizarBusqueda() {
            currentSearchQuery = searchInput.value.trim().toLowerCase();
            currentPage = 1; // Reiniciar siempre a la primera página al buscar

            if (currentSearchQuery === '') {
                clearButton.classList.add('hidden');
                // Si no hay búsqueda, mostramos todos los materiales ordenados
                currentFilteredResults = [...materiales].sort((a, b) => a.nombre.localeCompare(b.nombre));
            } else {
                clearButton.classList.remove('hidden');
                // Filtramos por coincidencia y luego ordenamos
                currentFilteredResults = materiales
                    .filter(item => item._claveBusqueda.includes(currentSearchQuery))
                    .sort((a, b) => a.nombre.localeCompare(b.nombre));
            }
            
            // Renderizamos la página correspondiente (la 1)
            mostrarPaginaActual();
        }

        // OPTIMIZACIÓN 5: Función Debounce para no saturar el procesador mientras tecleas rápido
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        searchInput.addEventListener('input', debounce(realizarBusqueda, 150));

        clearButton.addEventListener('click', () => {
            searchInput.value = '';
            realizarBusqueda();
            searchInput.focus();
        });

        // ==========================================
        // 8. INICIALIZACIÓN DE LA APLICACIÓN
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            lucide.createIcons(); // Dibuja solo los iconos principales fijos (lupa, luna, sol)
            realizarBusqueda();   // Inicia la lista renderizando la primera página con los primeros 50 ítems
        });
    </script>
</body>
</html>
